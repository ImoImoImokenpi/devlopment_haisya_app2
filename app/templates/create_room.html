{% extends "layout.html" %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('events.event_detail', event_id=event.id) }}" class="text-decoration-none text-muted me-3">
        <i class="bi bi-chevron-left"></i>
    </a>
    <h5 class="fw-bold mb-0">ルームの作成</h5>
</div>

<div class="main-card border-0 shadow-sm mb-4 bg-light p-3 rounded-4">
    <div class="small text-muted">イベント</div>
    <div class="fw-bold text-dark">{{ event.title }}</div>
</div>

<form action="{{ url_for('rooms.create_room', event_id=event.id) }}" method="POST">
    
    <div class="mb-4">
        <label class="form-label small fw-bold text-muted px-1">基本設定</label>
        <div class="main-card shadow-none border-0 bg-white p-3 shadow-sm rounded-4">
            <div class="mb-3">
                <label class="small text-muted mb-1">ルーム名</label>
                <input type="text" name="car_name" class="form-control border-0 bg-light py-2" 
                    placeholder="例: ルーム{{ next_room_num }}" 
                    value="ルーム{{ next_room_num }}"> 
            </div>
            <div class="mb-0">
                <label class="small text-muted mb-1">募集締切日時</label>
                <input type="datetime-local" name="deadline" class="form-control border-0 bg-light py-2" required>
            </div>
        </div>
    </div>

    <div class="mb-4">
        <label class="form-label small fw-bold text-muted px-1">参加者への質問設定</label>
        <div class="main-card shadow-none border-0 bg-white p-3 shadow-sm rounded-4">
            <p class="small text-muted mb-3">回答を求める項目にチェックしてください：</p>
            
            <div class="d-flex flex-column gap-3">
                <div class="custom-option">
                    <input class="btn-check" type="checkbox" name="selected_questions" 
                        value="q_schedule" id="q_schedule" autocomplete="off">
                    <label class="btn btn-outline-custom w-100 text-start py-3 px-3 border rounded-3" for="q_schedule">
                        <div class="d-flex align-items-center justify-content-between">
                            <div class="d-flex align-items-center">
                                <i class="bi bi-list-ol me-3 fs-5 icon-default"></i>
                                <span class="fw-medium">出演順の回答</span>
                            </div>
                            <i class="bi bi-circle check-icon"></i>
                        </div>
                    </label>
                    
                    <div id="section_setting" class="mt-2 p-3 bg-light rounded-3 d-none border">
                        <label class="small fw-bold text-dark mb-2">最大部数の設定</label>
                        <select name="sections" class="form-select border-0 py-2">
                            {% for i in range(1, 6) %}
                            <option value="{{ i }}">{{ i }}部まで表示</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                {% set items = [
                    ('q_rehersal', 'リハーサルの有無', 'bi-music-note-beamed'),
                    ('q_avoid', '同乗の配慮（避けたい人）', 'bi-person-x')
                ] %}

                {% for id, label, icon in items %}
                <div class="custom-option">
                    <input class="btn-check" type="checkbox" name="selected_questions" 
                        value="{{ id }}" id="{{ id }}" autocomplete="off">
                    <label class="btn btn-outline-custom w-100 text-start py-3 px-3 border rounded-3 d-flex align-items-center justify-content-between" 
                        for="{{ id }}">
                        <div class="d-flex align-items-center">
                            <i class="bi {{ icon }} me-3 fs-5 icon-default"></i>
                            <span class="fw-medium">{{ label }}</span>
                        </div>
                        <i class="bi bi-circle check-icon"></i>
                    </label>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <div class="d-grid gap-2 mb-5">
        <button type="submit" class="btn btn-walica py-3 shadow-sm fw-bold rounded-pill">
            ルームを作成する
        </button>
        <a href="{{ url_for('events.event_detail', event_id=event.id) }}" 
           class="btn btn-link text-muted text-decoration-none small">キャンセル</a>
    </div>
</form>

<style>
/* カスタムカラー変数の定義（もし他で定義されていなければ） */
:root { --walica-green: #20c997; }

/* 共通ラベルスタイル */
.btn-outline-custom {
    border: 1px solid #eee !important;
    background-color: #fcfcfc;
    color: #444;
    transition: all 0.2s;
}

/* チェックされた時の変化（クラス名を修正） */
.btn-check:checked + .btn-outline-custom {
    background-color: rgba(32, 201, 151, 0.05) !important;
    border-color: var(--walica-green) !important;
    color: var(--walica-green) !important;
}

/* チェックアイコンの切り替え（○を●にする） */
.btn-check:checked + .btn-outline-custom .check-icon::before {
    content: "\f26b"; /* bi-check-circle-fill */
    font-family: "bootstrap-icons";
    color: var(--walica-green);
}

.btn-check:checked + .btn-outline-custom .icon-default {
    color: var(--walica-green);
}

.icon-default { color: #adb5bd; }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const scheduleCheck = document.getElementById('q_schedule');
    const settingDiv = document.getElementById('section_setting');

    if (scheduleCheck) {
        scheduleCheck.addEventListener('change', function() {
            if (this.checked) {
                settingDiv.classList.remove('d-none');
            } else {
                settingDiv.classList.add('d-none');
            }
        });
    }
});
</script>
{% endblock %}
