{% extends "layout.html" %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('index') }}" class="text-decoration-none text-muted me-3">
        <i class="bi bi-chevron-left"></i>
    </a>
    <h5 class="fw-bold mb-0">イベントの作成</h5>
</div>

<form action="/events/create" method="POST">
    <div class="mb-4">
        <label class="form-label small fw-bold text-muted px-1">投稿先を選択</label>
        <div class="d-flex flex-column gap-2">
            <div class="form-check custom-radio-card p-0">
                <input class="form-check-input d-none" type="radio" name="group_id" id="group_none" value="" checked>
                <label class="form-check-label w-100 p-3 rounded-4 border bg-white d-flex align-items-center justify-content-between" for="group_none">
                    <div class="d-flex align-items-center">
                        <div class="icon-circle bg-light me-3">
                            <i class="bi bi-person-fill text-muted"></i>
                        </div>
                        <div>
                            <div class="fw-bold small">個人カレンダー</div>
                            <div class="text-muted" style="font-size: 0.7rem;">自分専用のメモとして</div>
                        </div>
                    </div>
                    <i class="bi bi-check-circle-fill text-walica check-icon fs-5"></i>
                </label>
            </div>

            {% if admin_groups %}
                {% for group in admin_groups %}
                <div class="form-check custom-radio-card p-0">
                    <input class="form-check-input d-none" type="radio" name="group_id" id="group_{{ group.id }}" value="{{ group.id }}">
                    <label class="form-check-label w-100 p-3 rounded-4 border bg-white d-flex align-items-center justify-content-between" for="group_{{ group.id }}">
                        <div class="d-flex align-items-center">
                            <div class="icon-circle bg-walica-light me-3">
                                <i class="bi bi-people-fill text-walica"></i>
                            </div>
                            <div>
                                <div class="fw-bold small">{{ group.name }}</div>
                                <div class="text-muted" style="font-size: 0.7rem;">グループ全員に共有されます</div>
                            </div>
                        </div>
                        <i class="bi bi-check-circle-fill text-walica check-icon fs-5"></i>
                    </label>
                </div>
                {% endfor %}
            {% endif %}
        </div>
    </div>

    <div class="mb-4">
        <label class="form-label small fw-bold text-muted px-1">基本情報</label>
        <div class="main-card border-0 shadow-sm p-4 bg-white rounded-4">
            <div class="mb-4">
                <input type="text" name="title" class="form-control form-control-lg border-0 bg-light py-3 rounded-4 px-3" 
                       placeholder="イベント名" style="font-weight: 500;" required>
            </div>

            <div class="mb-4">
                <label class="small fw-bold text-muted mb-2 ms-1">開催場所</label>
                <div class="input-group bg-light rounded-4 px-2">
                    <span class="input-group-text bg-transparent border-0 text-muted"><i class="bi bi-geo-alt"></i></span>
                    <input type="text" name="location" class="form-control bg-transparent border-0 py-3" placeholder="場所を入力（任意）">
                </div>
            </div>

            <div class="mb-4">
                <label class="small fw-bold text-muted mb-2 ms-1">メモ・詳細</label>
                <textarea name="description" class="form-control bg-light border-0 rounded-4 py-3 px-3"
                          rows="3" placeholder="自由記述（任意）" style="resize: none;"></textarea>
            </div>

            <div class="row g-3">
                <div class="col-6">
                    <label class="small fw-bold text-muted mb-2 ms-1">開始日時</label>
                    <input type="datetime-local" name="start_time" 
                           class="form-control rounded-4 border-0 bg-light py-3"
                           value="{{ default_start }}" required> 
                </div>
                <div class="col-6">
                    <label class="small fw-bold text-muted mb-2 ms-1">終了日時</label>
                    <input type="datetime-local" name="end_time"
                           class="form-control rounded-4 border-0 bg-light py-3"
                           value="{{ default_end }}"> 
                </div>
            </div>
        </div>
    </div>

    <div class="mb-5">
        <label class="form-label small fw-bold text-muted px-1">配車設定</label>
        <div class="main-card border-0 shadow-sm p-4 bg-white rounded-4">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <p class="mb-0 fw-bold">🚗 配車を募集する</p>
                    <small class="text-muted">参加者の車割りを管理できます</small>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="needs_car" id="needs_car" checked style="width: 2.8em; height: 1.4em; cursor: pointer;">
                </div>
            </div>
        </div>
    </div>

    <div class="d-grid gap-3 mb-5">
        <button type="submit" class="btn btn-walica py-3 fw-bold rounded-pill shadow-sm">
            イベントを作成する
        </button>
        <a href="{{ url_for('index') }}" class="btn btn-link btn-sm text-muted text-decoration-none">
            キャンセル
        </a>
    </div>
</form>

<style>
    /* ラジオカードのカスタマイズ */
    .custom-radio-card label {
        cursor: pointer;
        transition: all 0.2s ease;
        border-width: 2px !important;
    }
    
    .custom-radio-card .form-check-input:checked + label {
        border-color: var(--walica-green) !important;
        background-color: rgba(32, 201, 151, 0.05) !important;
        box-shadow: 0 4px 12px rgba(32, 201, 151, 0.1);
    }

    .icon-circle {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
    }

    .bg-walica-light { background-color: rgba(32, 201, 151, 0.1); }

    .check-icon { 
        color: var(--walica-green);
        opacity: 0; 
        transform: scale(0.5);
        transition: all 0.2s ease; 
    }
    
    .custom-radio-card .form-check-input:checked + label .check-icon { 
        opacity: 1; 
        transform: scale(1);
    }

    /* フォーム入力 */
    .form-control:focus {
        background-color: #fff !important;
        border: 1px solid var(--walica-green) !important;
        box-shadow: 0 0 0 0.25rem rgba(32, 201, 151, 0.1) !important;
    }

    /* スイッチの色 */
    .form-check-input:checked {
        background-color: var(--walica-green);
        border-color: var(--walica-green);
    }
</style>
{% endblock %}
